global(DefaultNetstreamDriver="gtls")
global(DefaultNetstreamDriverCAFile="/etc/rsyslog/certs/ca.pem")
global(DefaultNetstreamDriverCertFile="/etc/rsyslog/certs/server-cert.pem")
global(DefaultNetstreamDriverKeyFile="/etc/rsyslog/certs/server-key.pem")

module(load="imtcp")
module(load="imudp")
module(load="gtls")

input(type="imtcp" port="6514" StreamDriver.Name="gtls" StreamDriver.Mode="1" StreamDriver.AuthMode="anon")
input(type="imudp" port="514")

template(name="RemoteLogs" type="string" string="/var/log/remote/%HOSTNAME%/%PROGRAMNAME%.log")

*.* ?RemoteLogs
& stop