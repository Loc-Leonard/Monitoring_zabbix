[supervisord]
nodaemon=true

[program:sshd]
command=/usr/sbin/sshd -D
autorestart=true

[program:rsyslog]
command=/usr/sbin/rsyslogd -n
autorestart=true

[program:snmpd]
command=/usr/sbin/snmpd -f -Lo
autorestart=true

[program:apache2]
command=/usr/sbin/apachectl -D FOREGROUND
autorestart=true

[program:zabbix-agent2]
command=/usr/sbin/zabbix_agent2 -f
autorestart=true